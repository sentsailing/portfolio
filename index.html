<!-- Flash-free bootstrap: set the saved/auto scheme + accent before paint -->
<script>
  (function(){
    try{
      var saved = localStorage.getItem("dyw-theme");
      if(!saved){
        saved = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "accent";
      }
      document.documentElement.setAttribute("data-theme", saved);
      document.documentElement.style.setProperty("--accent-hue", "#1F8A5B");
    }catch(e){
      document.documentElement.style.setProperty("--accent-hue", "#1F8A5B");
    }
  })();
</script>
